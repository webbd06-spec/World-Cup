name: WC 2026 Matchday Pipeline

# ── Triggers ──────────────────────────────────────────────────────────────────
#
# Job routing:
#   schedule '0 11 * * *'           → morning-prediction only
#   schedule '*/15 0-5,14-23 * * *' → pre-kickoff-update only
#
# GitHub Actions triggers ALL jobs for each cron entry. The `if:` on each job
# uses github.event.schedule to ensure only the intended job runs.
# workflow_dispatch lets you choose which job to trigger manually.

on:
  schedule:
    - cron: "0 11 * * *"             # 11:00 UTC = 07:00 ET / 06:00 CT
    - cron: "*/15 0-5,14-23 * * *"  # every 15 min, 14:00–06:00 UTC
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: morning
        type: choice
        options:
          - morning
          - pre-kickoff

permissions:
  contents: write   # needed to push commits back to main

env:
  PYTHON_VERSION: "3.11"
  PYTHONUTF8: "1"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Morning prediction (daily at 11:00 UTC)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  morning-prediction:
    name: "Morning prediction"
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'morning')

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 1 — fetch fixtures, Elo, venues, odds
      - name: "Step 1 — Fetch live data (update.py)"
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/update.py

      # Step 2 — web-search for injury/squad news; writes data/news/<id>.json
      - name: "Step 2 — Search team news for today's fixtures"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/news.py --fetch

      # Step 3 — run Poisson model, write outputs/predictions.json
      - name: "Step 3 — Generate predictions (predict.py)"
        run: python src/predict.py

      # Step 4 — re-apply news multipliers on top of fresh predictions
      - name: "Step 4 — Apply news adjustments to predictions.json"
        run: python src/news.py --apply

      # Step 5 — copy into docs/ so GitHub Pages can serve the files
      - name: "Step 5 — Copy predictions.json, odds, and results → docs/"
        run: |
          cp outputs/predictions.json docs/predictions.json
          cp outputs/live_odds_uk.json docs/live_odds_uk.json 2>/dev/null || true
          cp data/results.json docs/results.json 2>/dev/null || true

      # Step 6 — optional Telegram ping (failures don't abort the workflow)
      - name: "Step 6 — Telegram notification"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/notify.py
        continue-on-error: true

      # Step 7 — commit everything back to main
      - name: "Step 7 — Commit and push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/predictions.json \
                  docs/predictions.json \
                  docs/live_odds_uk.json \
                  docs/results.json \
                  data/fixtures.json \
                  data/results.json \
                  data/teams.json \
                  data/news/
          git diff --staged --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "chore: daily predictions $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Pre-kickoff lineup update (every 15 min on matchdays)
# ─────────────────────────────────────────────────────────────────────────────
  pre-kickoff-update:
    name: "Pre-kickoff lineup update"
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/15 0-5,14-23 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'pre-kickoff')

    # Prevent two concurrent lineup-update runs racing over the same commit
    concurrency:
      group: pre-kickoff-update
      cancel-in-progress: false

    steps:
      # Gate: only proceed inside the tournament window (Jun 11 – Jul 19 2026)
      - name: "Check tournament window"
        id: date-gate
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" < "2026-06-11" || "$TODAY" > "2026-07-19" ]]; then
            echo "Outside tournament window ($TODAY) — exiting."
            echo "in_window=false" >> "$GITHUB_OUTPUT"
          else
            echo "Inside tournament window ($TODAY)."
            echo "in_window=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.date-gate.outputs.in_window == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        if: steps.date-gate.outputs.in_window == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        if: steps.date-gate.outputs.in_window == 'true'
        run: pip install -r requirements.txt

      # Step 1 — scan fixtures.json for any match kicking off within 90 minutes
      #   Outputs: has_match=true|false   match_ids="GS_L1 GS_A2"
      - name: "Step 1 — Check for kickoffs within 90 minutes"
        if: steps.date-gate.outputs.in_window == 'true'
        id: kickoff-check
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python src/lineup.py --check

      # Step 2 — fetch confirmed lineups, write adjusted data/news/<id>.json,
      #           then re-apply all adjustments to predictions.json
      - name: "Step 2 — Fetch lineups and update predictions"
        if: >-
          steps.date-gate.outputs.in_window == 'true' &&
          steps.kickoff-check.outputs.has_match == 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >-
          python src/lineup.py --update
          ${{ steps.kickoff-check.outputs.match_ids }}

      # Step 3 — copy updated file to docs/
      - name: "Step 3 — Copy updated predictions.json → docs/"
        if: >-
          steps.date-gate.outputs.in_window == 'true' &&
          steps.kickoff-check.outputs.has_match == 'true'
        run: cp outputs/predictions.json docs/predictions.json

      # Step 4 — Telegram notification for each confirmed lineup
      - name: "Step 4 — Telegram lineup notification"
        if: >-
          steps.date-gate.outputs.in_window == 'true' &&
          steps.kickoff-check.outputs.has_match == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for id in ${{ steps.kickoff-check.outputs.match_ids }}; do
            python src/notify.py --lineup "$id"
          done
        continue-on-error: true

      # Step 5 — commit only if there was actually something to update
      - name: "Step 5 — Commit and push"
        if: >-
          steps.date-gate.outputs.in_window == 'true' &&
          steps.kickoff-check.outputs.has_match == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/predictions.json \
                  docs/predictions.json \
                  data/news/
          git diff --staged --quiet && { echo "Nothing to commit."; exit 0; }
          MATCH_IDS="${{ steps.kickoff-check.outputs.match_ids }}"
          git commit -m "chore: pre-kickoff update ${MATCH_IDS} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
