name: WC 2026 — Morning Prediction

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 07:00 ET / 12:00 BST
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  PYTHONUTF8: "1"

jobs:
  morning-prediction:
    name: "Morning prediction"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 1 — fetch fixtures, Elo, venues, odds
      - name: "Step 1 — Fetch live data (update.py)"
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python src/update.py

      # Step 2 — web-search for injury/squad news; writes data/news/<id>.json
      - name: "Step 2 — Search team news for today's fixtures"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/news.py --fetch

      # Step 3 — run Poisson model, write outputs/predictions.json
      - name: "Step 3 — Generate predictions (predict.py)"
        run: python src/predict.py

      # Step 4 — re-apply news multipliers on top of fresh predictions
      - name: "Step 4 — Apply news adjustments to predictions.json"
        run: python src/news.py --apply

      # Step 5 — copy into docs/ so GitHub Pages can serve the files
      - name: "Step 5 — Copy predictions.json, odds, and results → docs/"
        run: |
          cp outputs/predictions.json docs/predictions.json
          cp outputs/live_odds_uk.json docs/live_odds_uk.json 2>/dev/null || true
          cp data/results.json docs/results.json 2>/dev/null || true

      # Step 6 — optional Telegram ping (failures don't abort the workflow)
      - name: "Step 6 — Telegram notification"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/notify.py
        continue-on-error: true

      # Step 7 — commit everything back to main
      - name: "Step 7 — Commit and push"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/predictions.json \
                  docs/predictions.json \
                  docs/live_odds_uk.json \
                  docs/results.json \
                  data/fixtures.json \
                  data/results.json \
                  data/teams.json \
                  data/news/
          git diff --staged --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "chore: daily predictions $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
