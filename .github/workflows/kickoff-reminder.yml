name: WC 2026 — Kickoff Reminder

on:
  schedule:
    - cron: "*/15 0-5,13-23 * * *"   # every 15 min during match hours UTC
  workflow_dispatch:

permissions:
  contents: read   # read-only — this job never commits

env:
  PYTHON_VERSION: "3.11"
  PYTHONUTF8: "1"

jobs:
  kickoff-reminder:
    name: "Kickoff reminder"
    runs-on: ubuntu-latest

    steps:
      # Gate: only proceed inside the tournament window (Jun 11 – Jul 19 2026)
      - name: "Check tournament window"
        id: date-gate
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" < "2026-06-11" || "$TODAY" > "2026-07-19" ]]; then
            echo "Outside tournament window ($TODAY) — exiting."
            echo "in_window=false" >> "$GITHUB_OUTPUT"
          else
            echo "in_window=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.date-gate.outputs.in_window == 'true'
        uses: actions/checkout@v5

      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        if: steps.date-gate.outputs.in_window == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        if: steps.date-gate.outputs.in_window == 'true'
        run: pip install -r requirements.txt

      # Send a Telegram reminder for any match kicking off in 55–75 minutes.
      # The 20-minute window covers GitHub cron jitter and guarantees exactly
      # one notification per match regardless of which 15-min slot fires.
      - name: "Send kickoff reminder"
        if: steps.date-gate.outputs.in_window == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/notify.py --remind
